services:
  - type: web
    name: student-manager-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Set these in the Render dashboard (never commit real values):
      - key: WEBHOOK_URL
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: VITE_ADMIN_EMAIL
        sync: false
